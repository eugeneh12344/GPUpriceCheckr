envVarGroups:
  - name: gpu-rate-index-secrets
    envVars:
      - key: CRON_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: REPORT_TO_EMAIL
        sync: false
      - key: REPORT_FROM_EMAIL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_SESSION_TOKEN
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_CLOUD_API_KEY
        sync: false

services:
  - type: web
    name: gpupricecheckr
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/meta
    disk:
      name: gpupricecheckr-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - fromGroup: gpu-rate-index-secrets
      - key: DATA_DIR
        value: /var/data
      - key: NODE_VERSION
        value: 22.16.0

  - type: cron
    name: gpupricecheckr-daily-report
    runtime: node
    schedule: "0 12 * * *"
    buildCommand: npm install
    startCommand: npm run daily-report
    envVars:
      - fromGroup: gpu-rate-index-secrets
      - key: APP_BASE_URL
        value: https://gpupricecheckr-i8kp.onrender.com
      - key: NODE_VERSION
        value: 22.16.0
